<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ty's Fitness Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --surface3: #222222;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --green: #39ff14;
    --red: #ff3b30;
    --blue: #4fc3f7;
    --purple: #b44fff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px; border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 3px; color: var(--accent); }
  .logo span { color: var(--text2); font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 1px; display: block; margin-top: -4px; }
  .header-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); text-align: right; }

  /* LAYOUT */
  .app { display: grid; grid-template-columns: 240px 1fr 340px; height: calc(100vh - 61px); }

  /* SIDEBAR */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 20px 0; }
  .sidebar-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 2px; padding: 0 20px 12px; text-transform: uppercase; }
  .day-btn {
    display: block; width: 100%; text-align: left; padding: 13px 20px;
    background: none; border: none; border-left: 3px solid transparent;
    cursor: pointer; transition: all 0.15s; color: var(--text2);
  }
  .day-btn:hover { background: var(--surface2); color: var(--text); }
  .day-btn.active { background: var(--surface2); border-left-color: var(--accent); color: var(--accent); }
  .day-btn .day-name { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; display: block; line-height: 1.2; }
  .day-btn .day-type { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); margin-top: 3px; }
  .day-btn.active .day-type { color: var(--text2); }

  /* MAIN */
  .main { overflow-y: auto; padding: 24px 28px; background: var(--bg); }
  .day-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; gap: 16px; }
  .day-title { font-family: 'Bebas Neue', sans-serif; font-size: 46px; line-height: 1; letter-spacing: 2px; }
  .day-title .accent { color: var(--accent); }
  .day-subtitle { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 1px; margin-top: 5px; }
  .ask-trainer-btn {
    background: var(--accent); color: #000; border: none; padding: 10px 18px;
    font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 2px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .ask-trainer-btn:hover { background: #fff; }

  /* PROGRESS */
  .progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .progress-bar-wrap { flex: 1; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
  .progress-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text2); white-space: nowrap; }

  /* COL HEADERS */
  .col-headers { display: grid; grid-template-columns: 1fr 72px 72px 72px 60px 30px 30px; padding: 4px 16px; gap: 6px; margin-bottom: 4px; }
  .col-hdr { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); text-align: center; letter-spacing: 1px; }
  .col-hdr:first-child { text-align: left; }

  /* EXERCISE CARD */
  .exercise-card { background: var(--surface); border: 1px solid var(--border); margin-bottom: 8px; overflow: hidden; transition: border-color 0.2s; }
  .exercise-card.superset { border-left: 3px solid var(--accent2); }
  .exercise-card.finisher { border-left: 3px solid var(--purple); }
  .exercise-card.swapped { border-left: 3px solid var(--blue); }

  .tag-bar { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; padding: 3px 16px; border-bottom: 1px solid var(--border); }
  .tag-bar.superset { color: var(--accent2); background: rgba(255,107,53,0.06); }
  .tag-bar.finisher { color: var(--purple); background: rgba(180,79,255,0.06); }
  .tag-bar.swapped-bar { color: var(--blue); background: rgba(79,195,247,0.06); }

  .exercise-header {
    display: grid; grid-template-columns: 1fr 72px 72px 72px 60px 30px 30px;
    align-items: center; padding: 10px 16px; background: var(--surface2); gap: 6px;
  }
  .exercise-name { font-weight: 500; font-size: 13px; color: var(--text); }
  .exercise-meta { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); margin-top: 2px; }

  .set-input {
    width: 100%; background: var(--surface3); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 4px 6px; text-align: center; transition: border-color 0.15s;
  }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-input.pr { border-color: var(--accent); background: rgba(232,255,0,0.07); }

  .complete-btn {
    width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border);
    background: none; cursor: pointer; color: var(--text3); font-size: 12px;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  }
  .complete-btn.done { border-color: var(--green); background: rgba(57,255,20,0.1); color: var(--green); }

  /* SWAP BUTTON */
  .swap-btn {
    width: 26px; height: 26px; border-radius: 2px; border: 1px solid var(--border);
    background: none; cursor: pointer; color: var(--text3); font-size: 13px;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .swap-btn:hover { border-color: var(--blue); color: var(--blue); background: rgba(79,195,247,0.08); }
  .swap-btn.loading { opacity: 0.4; cursor: not-allowed; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SWAP SUGGESTION */
  .swap-panel {
    padding: 10px 16px; background: rgba(79,195,247,0.04);
    border-top: 1px solid rgba(79,195,247,0.15); display: none;
  }
  .swap-panel.visible { display: block; }
  .swap-panel-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--blue); letter-spacing: 1px; margin-bottom: 6px; }
  .swap-suggestion { font-size: 12px; color: var(--text2); line-height: 1.6; }
  .swap-actions { display: flex; gap: 8px; margin-top: 8px; }
  .swap-accept-btn {
    background: var(--blue); color: #000; border: none; padding: 4px 12px;
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px;
    cursor: pointer; transition: all 0.15s;
  }
  .swap-accept-btn:hover { background: #fff; }
  .swap-dismiss-btn {
    background: none; color: var(--text3); border: 1px solid var(--border); padding: 4px 12px;
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; cursor: pointer; transition: all 0.15s;
  }
  .swap-dismiss-btn:hover { color: var(--text); border-color: var(--text2); }

  /* PR BADGE */
  .pr-badge { background: var(--accent); color: #000; font-family: 'DM Mono', monospace; font-size: 8px; padding: 1px 5px; letter-spacing: 1px; margin-left: 6px; vertical-align: middle; }

  /* AI TRAINER PANEL */
  .trainer-panel { background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .trainer-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .trainer-avatar { width: 38px; height: 38px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: #000; flex-shrink: 0; }
  .trainer-name { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1px; }
  .trainer-status { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--green); display: flex; align-items: center; gap: 4px; margin-top: 2px; }
  .trainer-status::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .message { max-width: 92%; font-size: 12px; line-height: 1.6; }
  .message.trainer { align-self: flex-start; }
  .message.user { align-self: flex-end; }
  .message-label { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--text3); margin-bottom: 3px; letter-spacing: 1px; }
  .message.user .message-label { text-align: right; }
  .message-bubble { padding: 9px 13px; }
  .message.trainer .message-bubble { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 0 8px 8px 8px; }
  .message.user .message-bubble { background: var(--accent); color: #000; font-weight: 500; border-radius: 8px 0 8px 8px; }

  .typing-indicator { display: flex; gap: 4px; padding: 9px 13px; background: var(--surface2); border: 1px solid var(--border); width: fit-content; border-radius: 0 8px 8px 8px; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  .quick-prompts { padding: 0 14px 8px; display: flex; flex-wrap: wrap; gap: 5px; }
  .quick-btn { background: var(--surface3); border: 1px solid var(--border); color: var(--text2); font-family: 'DM Mono', monospace; font-size: 9px; padding: 4px 9px; cursor: pointer; transition: all 0.15s; border-radius: 2px; }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); }

  .trainer-input-row { padding: 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .trainer-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 9px 11px; border-radius: 2px; resize: none; height: 38px; transition: border-color 0.15s; }
  .trainer-input:focus { outline: none; border-color: var(--accent); }
  .send-btn { background: var(--accent); color: #000; border: none; width: 38px; height: 38px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .send-btn:hover { background: #fff; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 960px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; height: auto; }
    .sidebar { display: flex; overflow-x: auto; padding: 8px; border-right: none; border-bottom: 1px solid var(--border); }
    .day-btn { flex-shrink: 0; border-left: none; border-bottom: 3px solid transparent; padding: 8px 12px; }
    .day-btn.active { border-bottom-color: var(--accent); border-left-color: transparent; }
    .trainer-panel { height: 380px; border-left: none; border-top: 1px solid var(--border); }
    .main { height: auto; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">TY'S FITNESS PLAN
    <span>ARNOLD SPLIT · AI COACH</span>
  </div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="app">
  <nav class="sidebar" id="sidebarNav"></nav>
  <main class="main" id="mainContent"></main>
  <aside class="trainer-panel">
    <div class="trainer-header">
      <div class="trainer-avatar">AI</div>
      <div>
        <div class="trainer-name">Coach Arnold</div>

      <button class="send-btn" id="sendBtn" onclick="sendMessage()">▶</button>

  </aside>
</div>

      { name: 'V-Bar Pushdown',                      sets:3, reps:'10–12', tag:'superset', history:[80,87.5,95]  },

      { name: 'Rope Face Pull',                      sets:3, reps:'12–15', tag:'superset', history:[72.5,87.5,95] },
      { name: 'EZ-Bar Curl Drop Set',                sets:2, reps:'12–15', tag:'finisher', history:[85,65,45]    },

    ]

      { name: 'Leg Extension',         sets:3, reps:'15–20', tag:null, history:[155,160,165] },

      { name: 'Rear Delt Cables',         sets:3, reps:'12',    tag:null,       history:[20,20,25]   },
      { name: 'Arnold Press (full ROM)',  sets:3, reps:'8–10',  tag:null,       history:[60,50,50]   },
      { name: 'Cable Curl',               sets:3, reps:'8–10',  tag:'superset', history:[42.5,50,50] },

      { name: 'Bulgarian Split Squat',     sets:3, reps:'10 ea', tag:null, history:[45,45,45]    },
      { name: 'Glute Drive',               sets:3, reps:'10',    tag:null, history:[270,270,270] },

      { name: 'Abductor',                  sets:3, reps:'12',    tag:null, history:[60,70,80]    },
      { name: 'Leg Curl',                  sets:3, reps:'12–15', tag:null, history:[150,160,160] },
      { name: 'LP Machine Calf Raise',     sets:3, reps:'15–20', tag:null, history:[210,210,210] },
      { name: 'Cable Crunches',            sets:3, reps:'12–15', tag:null, history:[95,95,20]    },

// ============================================================
// STATE
// ============================================================
let currentDay = 0;
let completedSets = {};
let sessionWeights = {};
let chatHistory = [];
let swapSuggestions = {}; // exKey -> { text, altName }

// ============================================================
// INIT
// ============================================================
function init() {
  const now = new Date();
  document.getElementById('headerDate').innerHTML =
    `${now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}<br><span style="color:var(--text3)">Session tracking active</span>`;
  renderNav();
  renderDay(0);
  initTrainer();
}

function renderNav() {
  document.getElementById('sidebarNav').innerHTML =
    `<div class="sidebar-label">Training Days</div>` +
    PROGRAM.map((d,i) => `
      <button class="day-btn ${i===currentDay?'active':''}" onclick="selectDay(${i})">
        <span class="day-name">${d.name}</span>
        <div class="day-type">${d.type}</div>
      </button>`).join('');
}

function selectDay(idx) {
  currentDay = idx;
  renderNav();
  renderDay(idx);
  updateQuickPrompts();
}

// ============================================================
// RENDER DAY
// ============================================================
function renderDay(idx) {
  const day = PROGRAM[idx];
  const key = day.id;
  if (!completedSets[key]) completedSets[key] = {};
  if (!sessionWeights[key]) sessionWeights[key] = {};

  const totalSets = day.exercises.reduce((s,e)=>s+e.sets,0);
  const doneSets  = Object.values(completedSets[key]).filter(Boolean).length;
  const pct = totalSets > 0 ? Math.round(doneSets/totalSets*100) : 0;

  let html = `
    <div class="day-header">
      <div>
        <div class="day-title"><span class="accent">${day.short}</span> ${day.num}</div>
        <div class="day-subtitle">${day.focus.toUpperCase()} · ${day.exercises.length} EXERCISES · ${totalSets} TOTAL SETS</div>
      </div>
      <button class="ask-trainer-btn" onclick="askTrainerAboutDay()">ASK TRAINER</button>
    </div>
    <div class="progress-row">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:${pct}%"></div></div>
      <div class="progress-label" id="progressLabel">${doneSets}/${totalSets} SETS · ${pct}%</div>
    </div>
    <div class="col-headers">
      <div class="col-hdr">EXERCISE</div>
      <div class="col-hdr">SET 1</div>
      <div class="col-hdr">SET 2</div>
      <div class="col-hdr">SET 3</div>
      <div class="col-hdr">LAST</div>
      <div class="col-hdr" title="Suggest alternate exercise">ALT</div>
      <div class="col-hdr">✓</div>
    </div>`;

  day.exercises.forEach((ex, ei) => {
    const exKey  = `${key}_${ei}`;
    const done   = completedSets[key][exKey];
    const last   = ex.history[ex.history.length - 1];
    const rec    = getRecommended(ex);
    const w1     = sessionWeights[key][`${exKey}_1`] ?? '';
    const w2     = sessionWeights[key][`${exKey}_2`] ?? '';
    const w3     = sessionWeights[key][`${exKey}_3`] ?? '';
    const isPR   = (w1||w2||w3) && Math.max(parseFloat(w1)||0,parseFloat(w2)||0,parseFloat(w3)||0) > Math.max(...ex.history);
    const swap   = swapSuggestions[exKey];
    const isSwapped = swap && swap.accepted;

    const tagBar = ex.tag === 'superset'
      ? `<div class="tag-bar superset">SUPERSET</div>`
      : ex.tag === 'finisher'
        ? `<div class="tag-bar finisher">FINISHER / DROP SET</div>`
        : isSwapped
          ? `<div class="tag-bar swapped-bar">SWAPPED EXERCISE</div>`
          : '';

    const cardClass = isSwapped ? 'swapped' : ex.tag === 'superset' ? 'superset' : ex.tag === 'finisher' ? 'finisher' : '';
    const displayName = (isSwapped && swap.altName) ? swap.altName : ex.name;

    const swapPanelHtml = swap && !swap.accepted ? `
      <div class="swap-panel visible" id="swappanel_${exKey}">
        <div class="swap-panel-label">⇄ TRAINER SUGGESTION</div>
        <div class="swap-suggestion">${swap.text}</div>
        ${swap.altName ? `<div class="swap-actions">
          <button class="swap-accept-btn" onclick="acceptSwap('${key}','${exKey}',${ei})">USE THIS EXERCISE</button>
          <button class="swap-dismiss-btn" onclick="dismissSwap('${exKey}')">KEEP ORIGINAL</button>
        </div>` : `<div class="swap-actions">
          <button class="swap-dismiss-btn" onclick="dismissSwap('${exKey}')">DISMISS</button>
        </div>`}
      </div>` : '';

    html += `
      <div class="exercise-card ${cardClass}" id="card_${exKey}">
        ${tagBar}
        <div class="exercise-header">
          <div>
            <div class="exercise-name" id="exname_${exKey}">${displayName}${isPR?'<span class="pr-badge">PR</span>':''}</div>
            <div class="exercise-meta">${ex.sets}×${ex.reps} · LAST: ${last} lbs · REC: ${rec} lbs</div>
          </div>
          <input class="set-input${isPR?' pr':''}" type="number" value="${w1}" placeholder="${rec}" step="2.5"
            oninput="setWeight('${key}','${exKey}',1,this.value)">
          <input class="set-input" type="number" value="${w2}" placeholder="${rec}" step="2.5"
            oninput="setWeight('${key}','${exKey}',2,this.value)">
          <input class="set-input" type="number" value="${w3}" placeholder="${rec}" step="2.5"
            oninput="setWeight('${key}','${exKey}',3,this.value)">
          <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);text-align:center">${last}</div>
          <button class="swap-btn" id="swapbtn_${exKey}" title="Suggest alternate exercise" onclick="requestSwap('${key}','${exKey}',${ei})">⇄</button>
          <button class="complete-btn ${done?'done':''}" onclick="toggleDone('${key}','${exKey}')">
            ${done?'✓':'○'}
          </button>
        </div>
        ${swapPanelHtml}
      </div>`;
  });

  document.getElementById('mainContent').innerHTML = html;
}

// ============================================================
// WEIGHT + PROGRESS
// ============================================================
function getRecommended(ex) {
  const h = ex.history;
  const last = h[h.length-1];
  if (h.every(v=>v===last)) return last + 2.5;
  if (h[h.length-1] > h[0]) return last + 2.5;
  return last;
}

function setWeight(dayKey, exKey, setNum, val) {
  if (!sessionWeights[dayKey]) sessionWeights[dayKey] = {};
  sessionWeights[dayKey][`${exKey}_${setNum}`] = val;
  const day = PROGRAM.find(d=>d.id===dayKey);
  const ei  = parseInt(exKey.split('_').pop());
  const ex  = day.exercises[ei];
  const w1  = parseFloat(sessionWeights[dayKey][`${exKey}_1`])||0;
  const w2  = parseFloat(sessionWeights[dayKey][`${exKey}_2`])||0;
  const w3  = parseFloat(sessionWeights[dayKey][`${exKey}_3`])||0;
  const maxS = Math.max(w1,w2,w3);
  const maxH = Math.max(...ex.history);
  const card = document.getElementById(`card_${exKey}`);
  if (!card) return;
  const nameEl = card.querySelector('.exercise-name');
  if (maxS > maxH && maxS > 0) {
    if (!nameEl.querySelector('.pr-badge')) nameEl.innerHTML += '<span class="pr-badge">PR</span>';
    card.querySelectorAll('.set-input').forEach(i=>i.classList.add('pr'));
  } else {
    const b = nameEl.querySelector('.pr-badge'); if (b) b.remove();
    card.querySelectorAll('.set-input').forEach(i=>i.classList.remove('pr'));
  }
}

function toggleDone(dayKey, exKey) {
  if (!completedSets[dayKey]) completedSets[dayKey] = {};
  completedSets[dayKey][exKey] = !completedSets[dayKey][exKey];
  const btn = document.querySelector(`#card_${exKey} .complete-btn`);
  if (btn) { btn.classList.toggle('done'); btn.textContent = completedSets[dayKey][exKey]?'✓':'○'; }
  updateProgress(dayKey);
}

function updateProgress(dayKey) {
  const day = PROGRAM.find(d=>d.id===dayKey);
  const total = day.exercises.reduce((s,e)=>s+e.sets,0);
  const done  = Object.values(completedSets[dayKey]).filter(Boolean).length;
  const pct   = Math.round(done/total*100);
  const fill  = document.getElementById('progressFill');
  const lbl   = document.getElementById('progressLabel');
  if (fill) fill.style.width = pct+'%';
  if (lbl)  lbl.textContent  = `${done}/${total} SETS · ${pct}%`;
}

// ============================================================
// SWAP / ALTERNATE EXERCISE
// ============================================================
async function requestSwap(dayKey, exKey, ei) {
  const day = PROGRAM.find(d=>d.id===dayKey);
  const ex  = day.exercises[ei];
  const btn = document.getElementById(`swapbtn_${exKey}`);
  if (btn) { btn.classList.add('loading'); btn.textContent = '↻'; }

  const prompt = `The user wants an alternate exercise for: "${ex.name}" (${ex.sets}×${ex.reps}, history: [${ex.history.join(', ')}] lbs, muscle focus: ${day.type}).
  
Respond in this exact JSON format (nothing else, no markdown):
{"altName":"<exercise name>","reason":"<1-2 sentence explanation of why this is a good swap and what weight to start at>"}

Pick an exercise that targets the same muscle(s), fits the rep scheme, and works in a gym setting. Be specific about starting weight.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        system: buildSystemPrompt(),
        messages: [{ role:'user', content: prompt }]
      })
    });
    const data = await res.json();
    const raw  = data.content?.[0]?.text || '{}';
    let parsed = {};
    try { parsed = JSON.parse(raw.replace(/```json|```/g,'')); } catch(e) { parsed = { altName: null, reason: raw }; }

    swapSuggestions[exKey] = { text: parsed.reason || raw, altName: parsed.altName || null, accepted: false };
  } catch(err) {
    swapSuggestions[exKey] = { text: 'Could not reach trainer. Try again.', altName: null, accepted: false };
  }

  if (btn) { btn.classList.remove('loading'); btn.textContent = '⇄'; }
  // Re-render just this card's swap panel
  const card = document.getElementById(`card_${exKey}`);
  if (card) {
    const swap = swapSuggestions[exKey];
    let panelHtml = `
      <div class="swap-panel visible" id="swappanel_${exKey}">
        <div class="swap-panel-label">⇄ TRAINER SUGGESTION</div>
        <div class="swap-suggestion">${swap.text}</div>
        ${swap.altName ? `<div class="swap-actions">
          <button class="swap-accept-btn" onclick="acceptSwap('${dayKey}','${exKey}',${ei})">USE THIS EXERCISE</button>
          <button class="swap-dismiss-btn" onclick="dismissSwap('${exKey}')">KEEP ORIGINAL</button>
        </div>` : `<div class="swap-actions">
          <button class="swap-dismiss-btn" onclick="dismissSwap('${exKey}')">DISMISS</button>
        </div>`}
      </div>`;
    const existing = document.getElementById(`swappanel_${exKey}`);
    if (existing) existing.remove();
    card.insertAdjacentHTML('beforeend', panelHtml);
  }
}

function acceptSwap(dayKey, exKey, ei) {
  const swap = swapSuggestions[exKey];
  if (!swap || !swap.altName) return;
  swap.accepted = true;
  const nameEl = document.getElementById(`exname_${exKey}`);
  if (nameEl) nameEl.childNodes[0].textContent = swap.altName;
  const card = document.getElementById(`card_${exKey}`);
  if (card) {
    card.className = card.className.replace('superset','').replace('finisher','').trim() + ' swapped';
    const existing = document.getElementById(`swappanel_${exKey}`);
    if (existing) existing.remove();
    const tagBar = card.querySelector('.tag-bar');
    if (tagBar) { tagBar.className = 'tag-bar swapped-bar'; tagBar.textContent = 'SWAPPED EXERCISE'; }
    else card.insertAdjacentHTML('afterbegin','<div class="tag-bar swapped-bar">SWAPPED EXERCISE</div>');
  }
  // Also notify trainer
  sendMessage(`I swapped "${PROGRAM.find(d=>d.id===dayKey).exercises[ei].name}" for "${swap.altName}" today.`);
}

function dismissSwap(exKey) {
  const panel = document.getElementById(`swappanel_${exKey}`);
  if (panel) panel.remove();
  if (swapSuggestions[exKey]) swapSuggestions[exKey].accepted = false;
}

// ============================================================
// AI TRAINER
// ============================================================
function buildSystemPrompt() {
  const day = PROGRAM[currentDay];
  const sw  = sessionWeights[day.id] || {};
  return `You are Coach Arnold, a direct, no-nonsense personal trainer for Ty. You give specific, actionable advice grounded in his actual training data.

TY'S FULL PROGRAM:
${PROGRAM.map(d=>`\nDAY: ${d.name}\n${d.exercises.map(e=>`  - ${e.name}: ${e.sets}×${e.reps}, history: [${e.history.join(', ')}] lbs, rec: ${getRecommended(e)} lbs`).join('\n')}`).join('\n')}

TODAY: ${day.name} — ${day.focus}
Session weights logged so far: ${JSON.stringify(sw)}

Rules:
- Be specific with weight recommendations (use his actual history)
- Keep responses to 3–5 sentences unless asked for more
- Flag PR opportunities by name
- When suggesting swaps, name the exercise and the starting weight
- For alternate exercise requests, respond in the JSON format specified`;
}

async function sendMessage(prompt) {
  const input = document.getElementById('trainerInput');
  const msg   = prompt || input.value.trim();
  if (!msg) return;
  if (!prompt) input.value = '';
  addMessage('user', msg);
  chatHistory.push({ role:'user', content:msg });
  const tid = addTyping();
  document.getElementById('sendBtn').disabled = true;
  try {
    const res  = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system:buildSystemPrompt(), messages:chatHistory })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'No response.';
    removeTyping(tid);
    addMessage('trainer', reply);
    chatHistory.push({ role:'assistant', content:reply });
  } catch(e) {
    removeTyping(tid);
    addMessage('trainer', 'Connection error. Try again.');
  }
  document.getElementById('sendBtn').disabled = false;
}

function addMessage(role, text) {
  const c   = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="message-label">${role==='trainer'?'COACH ARNOLD':'TY'}</div><div class="message-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

let _tc = 0;
function addTyping() {
  const id = ++_tc;
  const c  = document.getElementById('messages');
  const d  = document.createElement('div');
  d.className='message trainer'; d.id=`typing_${id}`;
  d.innerHTML=`<div class="message-label">COACH ARNOLD</div><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  c.appendChild(d); c.scrollTop=c.scrollHeight; return id;
}
function removeTyping(id) { const e=document.getElementById(`typing_${id}`); if(e) e.remove(); }

function initTrainer() {
  const day = PROGRAM[currentDay];
  const msg = `Ready to work, Ty. Today is ${day.name} — ${day.focus}. ${day.exercises.length} exercises, ${day.exercises.reduce((s,e)=>s+e.sets,0)} total sets. Hit the ⇄ button on any exercise to get an alternate, or ask me anything.`;
  addMessage('trainer', msg);
  chatHistory.push({ role:'assistant', content:msg });
  updateQuickPrompts();
}

function askTrainerAboutDay() {
  const day = PROGRAM[currentDay];
  sendMessage(`Give me a full briefing on today's ${day.name} session — recommend starting weights for the key lifts and what to focus on.`);
}

function updateQuickPrompts() {
  const prompts = ['Recommend weights today','What can I PR today?','Superset strategy','Swap an exercise','Recovery tips'];
  document.getElementById('quickPrompts').innerHTML = prompts.map(p =>
    `<button class="quick-btn" onclick="sendMessage('${p}')">${p}</button>`).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('trainerInput').addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  init();
});
</script>
