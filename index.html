<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ty's Fitness Plan</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ty's Gym">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1108">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%231a1108'/%3E%3Crect x='20' y='82' width='140' height='16' rx='8' fill='%23c8923a'/%3E%3Crect x='10' y='70' width='20' height='40' rx='6' fill='%23c8923a'/%3E%3Crect x='150' y='70' width='20' height='40' rx='6' fill='%23c8923a'/%3E%3Crect x='35' y='62' width='14' height='56' rx='4' fill='%23c8923a'/%3E%3Crect x='131' y='62' width='14' height='56' rx='4' fill='%23c8923a'/%3E%3C/svg%3E">

    icons: [{ src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%231a1108'/%3E%3Crect x='20' y='88' width='152' height='16' rx='8' fill='%23c8923a'/%3E%3Crect x='10' y='74' width='22' height='44' rx='6' fill='%23c8923a'/%3E%3Crect x='160' y='74' width='22' height='44' rx='6' fill='%23c8923a'/%3E%3Crect x='36' y='64' width='16' height='64' rx='4' fill='%23c8923a'/%3E%3Crect x='140' y='64' width='16' height='64' rx='4' fill='%23c8923a'/%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" }]

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Libre+Baskerville:wght@400;700&family=Source+Code+Pro:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  /* Wood palette */
  --wood-dark:   #0e0b06;
  --wood-deep:   #1a1108;
  --wood-mid:    #2c1f0e;
  --wood-warm:   #3d2b12;
  --wood-grain:  #4a3318;
  --wood-light:  #6b4c25;
  --wood-honey:  #8b6535;
  --wood-amber:  #c8923a;
  --wood-gold:   #d4a55a;
  --wood-cream:  #f0e6d0;
  --wood-linen:  #e8dcc4;
  --wood-tan:    #c4aa80;
  --wood-muted:  #8a7560;

  --ink:         #1a1108;
  --text-primary: #f0e6d0;
  --text-secondary: #c4aa80;
  --text-muted:  #7a6a50;

  --accent:      #c8923a;
  --accent-glow: rgba(200,146,58,0.15);
  --success:     #7a9e6a;
  --success-bg:  rgba(122,158,106,0.12);

  --grain-url: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body {
  background: var(--wood-deep);
  background-image:
    repeating-linear-gradient(92deg, transparent, transparent 2px, rgba(200,146,58,0.015) 2px, rgba(200,146,58,0.015) 4px),
    repeating-linear-gradient(180deg, transparent, transparent 8px, rgba(0,0,0,0.08) 8px, rgba(0,0,0,0.08) 9px),
    linear-gradient(160deg, #1e1409 0%, #150f06 40%, #1a1108 70%, #0e0b06 100%);
  color: var(--text-primary);
  font-family: 'Libre Baskerville', Georgia, serif;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
}

/* ── SCREENS ── */
.screen { display:none; min-height:100vh; }
.screen.active { display:flex; flex-direction:column; }

/* ══════════════════════════════
   HOME SCREEN
══════════════════════════════ */
#homeScreen {
  align-items: center;
  justify-content: flex-start;
  padding: env(safe-area-inset-top, 20px) 20px 40px;
}

.home-header {
  width: 100%;
  text-align: center;
  padding: 48px 0 36px;
  position: relative;
}
.home-header::after {
  content: '';
  display: block;
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  margin: 18px auto 0;
}
.home-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--wood-cream);
  letter-spacing: 0.5px;
  line-height: 1.1;
}
.home-title span { color: var(--accent); }
.home-subtitle {
  font-family: 'Source Code Pro', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 8px;
}

.day-grid {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.day-card {
  background: linear-gradient(135deg, var(--wood-mid) 0%, var(--wood-warm) 100%);
  border: 1px solid var(--wood-grain);
  border-radius: 4px;
  padding: 20px 22px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(200,146,58,0.1);
}
.day-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    88deg,
    transparent,
    transparent 3px,
    rgba(200,146,58,0.02) 3px,
    rgba(200,146,58,0.02) 6px
  );
  pointer-events: none;
}
.day-card:hover, .day-card:active {
  background: linear-gradient(135deg, var(--wood-warm) 0%, var(--wood-grain) 100%);
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,146,58,0.2);
}
.day-card-left {}
.day-card-num {
  font-family: 'Source Code Pro', monospace;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.day-card-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--wood-cream);
  line-height: 1.2;
}
.day-card-focus {
  font-family: 'Source Code Pro', monospace;
  font-size: 10px;
  color: var(--wood-tan);
  margin-top: 5px;
  letter-spacing: 0.5px;
}
.day-card-arrow {
  font-size: 20px;
  color: var(--accent);
  flex-shrink: 0;
  margin-left: 16px;
}
.day-card-exercises {
  font-family: 'Source Code Pro', monospace;
  font-size: 9px;
  color: var(--text-muted);
  margin-top: 3px;
}

/* ══════════════════════════════
   WORKOUT SCREEN
══════════════════════════════ */
#workoutScreen { padding-bottom: 120px; }

.workout-topbar {
  background: linear-gradient(180deg, var(--wood-mid) 0%, transparent 100%);
  padding: env(safe-area-inset-top, 16px) 20px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(200,146,58,0.12);
}
.back-btn {
  background: none;
  border: 1px solid var(--wood-grain);
  color: var(--text-secondary);
  width: 36px; height: 36px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.back-btn:active { background: var(--wood-warm); }
.topbar-info { flex: 1; min-width: 0; }
.topbar-day {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--wood-cream);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar-meta {
  font-family: 'Source Code Pro', monospace;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 1px;
  margin-top: 2px;
}

/* PROGRESS BAR */
.progress-wrap {
  padding: 14px 20px 0;
}
.progress-labels {
  display: flex;
  justify-content: space-between;
  font-family: 'Source Code Pro', monospace;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.progress-track {
  height: 6px;
  background: var(--wood-mid);
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid var(--wood-grain);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--wood-honey), var(--accent));
  border-radius: 3px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 8px rgba(200,146,58,0.4);
}

/* EXERCISE LIST */
.exercise-list {
  padding: 16px 16px 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.ex-card {
  background: linear-gradient(160deg, var(--wood-mid) 0%, var(--wood-warm) 100%);
  border: 1px solid var(--wood-grain);
  border-radius: 4px;
  overflow: hidden;
  transition: all 0.3s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.ex-card.completed {
  background: linear-gradient(160deg, #0d0f0b 0%, #111508 100%);
  border-color: var(--success);
  opacity: 0.75;
}
.ex-card.superset { border-left: 3px solid #9b7a3a; }
.ex-card.finisher  { border-left: 3px solid #7a5a8a; }

.ex-tag {
  font-family: 'Source Code Pro', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 4px 14px;
  border-bottom: 1px solid rgba(200,146,58,0.1);
}
.ex-tag.superset { color: #c8a05a; background: rgba(155,122,58,0.12); }
.ex-tag.finisher  { color: #b08ac0; background: rgba(122,90,138,0.12); }

.ex-body { padding: 14px 14px 0; }

.ex-name-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.ex-name {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--wood-cream);
  line-height: 1.3;
}
.ex-card.completed .ex-name { color: var(--success); }
.ex-reps {
  font-family: 'Source Code Pro', monospace;
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 3px;
}

/* SET ROWS */
.sets-grid {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}
.set-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.set-label {
  font-family: 'Source Code Pro', monospace;
  font-size: 10px;
  color: var(--text-muted);
  width: 32px;
  flex-shrink: 0;
  letter-spacing: 1px;
}
.set-weight-box {
  flex: 1;
  background: var(--wood-dark);
  border: 1px solid var(--wood-grain);
  border-radius: 3px;
  padding: 0 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: all 0.25s ease;
  height: 40px;
}
.set-weight-box.logged {
  background: rgba(10,14,8,0.9);
  border-color: var(--success);
  box-shadow: inset 0 0 10px rgba(122,158,106,0.08);
}
.set-weight-input {
  font-family: 'Source Code Pro', monospace;
  font-size: 15px;
  color: var(--wood-cream);
  background: none;
  border: none;
  outline: none;
  width: 100%;
  min-width: 0;
  -moz-appearance: textfield;
}
.set-weight-input::-webkit-outer-spin-button,
.set-weight-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.set-weight-input::placeholder { color: var(--text-muted); }
.set-weight-box.logged .set-weight-input { color: var(--success); }
.set-unit {
  font-family: 'Source Code Pro', monospace;
  font-size: 10px;
  color: var(--text-muted);
  flex-shrink: 0;
  margin-left: 4px;
}
/* VOLUME COUNTER */
.volume-bar {
  background: linear-gradient(135deg, var(--wood-mid), var(--wood-warm));
  border-bottom: 1px solid var(--wood-grain);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.volume-label {
  font-family: 'Source Code Pro', monospace;
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.volume-num {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--accent);
  line-height: 1;
  text-align: right;
}
.volume-unit {
  font-family: 'Source Code Pro', monospace;
  font-size: 9px;
  color: var(--text-muted);
  text-align: right;
  letter-spacing: 1px;
}
.log-btn {
  background: var(--wood-grain);
  border: 1px solid var(--wood-honey);
  color: var(--wood-gold);
  font-family: 'Source Code Pro', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 6px 12px;
  border-radius: 2px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  flex-shrink: 0;
}
.log-btn:active { background: var(--wood-honey); color: var(--ink); }
.log-btn.logged-btn {
  background: var(--success-bg);
  border-color: var(--success);
  color: var(--success);
}

/* COMPLETE ROW */
.ex-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 10px 14px 12px;
  border-top: 1px solid rgba(200,146,58,0.08);
  margin-top: 4px;
  gap: 10px;
}
.swap-sm-btn {
  background: none;
  border: 1px solid var(--wood-grain);
  color: var(--text-muted);
  font-family: 'Source Code Pro', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 6px 12px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
}
.swap-sm-btn:active { border-color: #4fc3f7; color: #4fc3f7; }
.complete-ex-btn {
  background: linear-gradient(135deg, var(--wood-grain), var(--wood-honey));
  border: 1px solid var(--accent);
  color: var(--wood-cream);
  font-family: 'Source Code Pro', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 8px 18px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(200,146,58,0.2);
}
.complete-ex-btn:active { background: var(--accent); color: var(--ink); transform: scale(0.98); }
.complete-ex-btn.done {
  background: var(--success-bg);
  border-color: var(--success);
  color: var(--success);
}

/* SWAP PANEL */
.swap-panel {
  margin: 0 14px 12px;
  background: rgba(79,195,247,0.05);
  border: 1px solid rgba(79,195,247,0.2);
  border-radius: 3px;
  padding: 12px;
  display: none;
}
.swap-panel.open { display:block; }
.swap-panel-label {
  font-family: 'Source Code Pro', monospace;
  font-size: 9px;
  color: #4fc3f7;
  letter-spacing: 2px;
  margin-bottom: 6px;
}
.swap-text { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
.swap-btns { display:flex; gap:8px; margin-top:8px; }
.swap-use-btn {
  background: rgba(79,195,247,0.15);
  border: 1px solid #4fc3f7;
  color: #4fc3f7;
  font-family: 'Source Code Pro', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  padding: 5px 12px;
  border-radius: 2px;
  cursor: pointer;
}
.swap-no-btn {
  background: none;
  border: 1px solid var(--wood-grain);
  color: var(--text-muted);
  font-family: 'Source Code Pro', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  padding: 5px 12px;
  border-radius: 2px;
  cursor: pointer;
}

/* COMPLETE WORKOUT BUTTON */
.finish-wrap {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  padding: 16px 20px calc(env(safe-area-inset-bottom, 0px) + 16px);
  background: linear-gradient(0deg, var(--wood-deep) 60%, transparent);
  z-index: 40;
}
.finish-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--wood-amber) 0%, var(--wood-gold) 100%);
  border: none;
  color: var(--ink);
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 16px;
  border-radius: 4px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(200,146,58,0.4);
  transition: all 0.2s;
  opacity: 0.4;
  pointer-events: none;
}
.finish-btn.ready {
  opacity: 1;
  pointer-events: all;
}
.finish-btn:active { transform: scale(0.98); box-shadow: 0 2px 10px rgba(200,146,58,0.3); }

/* ══════════════════════════════
   FEEDBACK SCREEN
══════════════════════════════ */
#feedbackScreen {
  padding: env(safe-area-inset-top, 20px) 20px calc(env(safe-area-inset-bottom,0px) + 40px);
  align-items: center;
}

.feedback-header {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
  padding-top: 8px;
}
.feedback-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--wood-cream);
  line-height: 1.2;
}
.feedback-title span { color: var(--accent); display:block; font-size:14px; font-weight:400; font-family:'Source Code Pro',monospace; letter-spacing:2px; margin-bottom:2px; }

.feedback-card {
  width: 100%;
  max-width: 480px;
  background: linear-gradient(160deg, var(--wood-mid) 0%, var(--wood-warm) 100%);
  border: 1px solid var(--wood-grain);
  border-radius: 4px;
  padding: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  margin-bottom: 20px;
}
.feedback-loading {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-secondary);
  font-family: 'Source Code Pro', monospace;
  font-size: 12px;
  letter-spacing: 1px;
}
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--wood-grain);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.feedback-text {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.8;
  display: none;
}
.feedback-text strong { color: var(--wood-cream); }

.feedback-stats {
  width: 100%;
  max-width: 480px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.stat-box {
  background: var(--wood-mid);
  border: 1px solid var(--wood-grain);
  border-radius: 3px;
  padding: 14px;
  text-align: center;
}
.stat-val {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  color: var(--accent);
  line-height: 1;
}
.stat-lbl {
  font-family: 'Source Code Pro', monospace;
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 2px;
  margin-top: 4px;
}

.done-btn {
  width: 100%;
  max-width: 480px;
  background: linear-gradient(135deg, var(--wood-grain), var(--wood-honey));
  border: 1px solid var(--accent);
  color: var(--wood-cream);
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 600;
  padding: 15px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
}
.done-btn:active { background: var(--accent); color: var(--ink); }

/* DIVIDER */
.wood-divider {
  width: 100%;
  max-width: 480px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--wood-grain), transparent);
  margin: 4px 0;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--wood-grain); border-radius: 2px; }

/* ANIMATIONS */
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.ex-card { animation: fadeIn 0.3s ease both; }
</style>
</head>
<body>

<!-- ══ HOME SCREEN ══ -->
<div class="screen active" id="homeScreen">
  <div class="home-header">
    <div class="home-title">Ty's <span>Fitness</span> Plan</div>
    <div class="home-subtitle">Arnold Split · AI Coach</div>
  </div>
  <div class="day-grid" id="dayGrid"></div>
</div>

<!-- ══ WORKOUT SCREEN ══ -->
<div class="screen" id="workoutScreen">
  <div class="workout-topbar">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="topbar-info">
      <div class="topbar-day" id="topbarDay">—</div>
      <div class="topbar-meta" id="topbarMeta">—</div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-labels">
      <span id="progressText">0 of 0 exercises complete</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

    </div>

    <button class="finish-btn" id="finishBtn" onclick="goFeedback()">Complete Workout</button>
  </div>
</div>

<!-- ══ FEEDBACK SCREEN ══ -->
<div class="screen" id="feedbackScreen">

    </div>
    <div class="feedback-text" id="feedbackText"></div>
  </div>
  <button class="done-btn" onclick="goHome()">Back to Home</button>
</div>

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let currentDayIdx = 0;
let loggedSets  = {};   // exKey_setIdx -> true
let completedEx = {};   // exKey -> true
let swapData    = {};   // exKey -> {text, altName, accepted}

// ══════════════════════════════════════════════════════
// HOME
// ══════════════════════════════════════════════════════
function renderHome() {
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = PROGRAM.map((d,i) => `
    <div class="day-card" onclick="startDay(${i})" style="animation-delay:${i*0.06}s">
      <div class="day-card-left">
        <div class="day-card-num">Day ${i+1}</div>
        <div class="day-card-name">${d.name}</div>
        <div class="day-card-focus">${d.focus}</div>
        <div class="day-card-exercises">${d.exercises.length} exercises · ${d.exercises.reduce((s,e)=>s+e.sets,0)} sets</div>
      </div>
      <div class="day-card-arrow">›</div>
    </div>`).join('');
}

function goHome() {
  show('homeScreen');
}

// ══════════════════════════════════════════════════════
// START DAY
// ══════════════════════════════════════════════════════
function startDay(idx) {
  currentDayIdx = idx;
  loggedSets    = {};
  updateVolume();
  completedEx   = {};
  swapData      = {};

  const day = PROGRAM[idx];
  document.getElementById('topbarDay').textContent = day.name;
  document.getElementById('topbarMeta').textContent = day.type + ' · ' + day.exercises.length + ' EXERCISES';

  renderExercises(day);
  updateProgress(day);
  show('workoutScreen');
  window.scrollTo(0,0);
}

function renderExercises(day) {
  const list = document.getElementById('exerciseList');
  list.innerHTML = day.exercises.map((ex, ei) => {
    const exKey = `${day.id}_${ei}`;
    const last  = ex.history[ex.history.length - 1];
    const rec   = getRec(ex);

    const tagHtml = ex.tag === 'superset'
      ? `<div class="ex-tag superset">SUPERSET</div>`
      : ex.tag === 'finisher'
        ? `<div class="ex-tag finisher">FINISHER · DROP SET</div>`
        : '';

    // Build set rows — editable input pre-filled with last weight
    const setRows = Array.from({length: ex.sets}, (_,si) => {
      const setKey  = `${exKey}_${si}`;
      const weight  = ex.history[si] ?? last;
      return `
        <div class="set-row">
          <div class="set-label">SET ${si+1}</div>
          <div class="set-weight-box" id="box_${setKey}">
            <input class="set-weight-input" id="input_${setKey}"
              type="number" inputmode="decimal" step="2.5"
              value="${weight}" placeholder="${weight}"
              oninput="onWeightInput()"
              onfocus="this.select()">
            <div class="set-unit">lbs</div>
          </div>
          <button class="log-btn" id="logbtn_${setKey}" onclick="logSet('${exKey}','${setKey}',${si})">LOG</button>
        </div>`;
    }).join('');

    return `
      <div class="ex-card${ex.tag?' '+ex.tag:''}" id="card_${exKey}" style="animation-delay:${ei*0.04}s">
        ${tagHtml}
        <div class="ex-body">
          <div class="ex-name-row">
            <div>
              <div class="ex-name" id="exname_${exKey}">${ex.name}</div>
              <div class="ex-reps">${ex.sets} sets · ${ex.reps} reps · Last: ${last} lbs · Rec: ${rec} lbs</div>
            </div>
          </div>
          <div class="sets-grid">${setRows}</div>
        </div>
        <div class="swap-panel" id="swappanel_${exKey}">
          <div class="swap-panel-label">⇄ TRAINER SUGGESTION</div>
          <div class="swap-text" id="swaptext_${exKey}"></div>
          <div class="swap-btns">
            <button class="swap-use-btn" id="swapuse_${exKey}" onclick="acceptSwap('${exKey}',${ei})">USE THIS</button>
            <button class="swap-no-btn" onclick="closeSwap('${exKey}')">KEEP ORIGINAL</button>
          </div>
        </div>
        <div class="ex-footer">
          <button class="swap-sm-btn" onclick="requestSwap('${exKey}',${ei})">⇄ ALTERNATE</button>
          <button class="complete-ex-btn" id="compbtn_${exKey}" onclick="completeExercise('${exKey}',${ei})">COMPLETE</button>
        </div>
      </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
// LOGGING
// ══════════════════════════════════════════════════════
let totalVolume = 0;

function logSet(exKey, setKey, si) {
  // Don't double-count if already logged
  if (loggedSets[setKey]) return;

  const inputEl = document.getElementById(`input_${setKey}`);
  const weight  = parseFloat(inputEl?.value) || 0;
  loggedSets[setKey] = weight;

  const box = document.getElementById(`box_${setKey}`);
  const btn = document.getElementById(`logbtn_${setKey}`);
  if (box) box.classList.add('logged');
  if (btn) { btn.classList.add('logged-btn'); btn.textContent = '✓'; }

  // Find reps for this exercise and add to running total
  const day = PROGRAM[currentDayIdx];
  const ei  = parseInt(exKey.split('_').pop());
  const ex  = day.exercises[ei];
  const reps = getRepMidpoint(ex.reps);
  const added = weight * reps;
  const prev  = totalVolume;
  totalVolume += added;

  animateVolume(prev, totalVolume);
}

function onWeightInput() {
  // no-op — volume only updates on LOG
}

function getRepMidpoint(repsStr) {
  const clean = repsStr.replace(/[\u2013-]/g, '-').replace(/[^0-9-]/g, ' ').trim();
  const nums  = clean.split(/\s+/).map(Number).filter(n => !isNaN(n) && n > 0);
  if (nums.length === 0) return 1;
  if (nums.length === 1) return nums[0];
  return Math.round((nums[0] + nums[nums.length - 1]) / 2);
}

function animateVolume(from, to) {
  const el  = document.getElementById('volumeNum');
  if (!el) return;
  const dur = 600;
  const start = performance.now();
  function tick(now) {
    const p = Math.min((now - start) / dur, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    const val = Math.round(from + (to - from) * ease);
    el.textContent = val.toLocaleString();
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function updateVolume() {
  // Called on session start to reset
  totalVolume = 0;
  const el = document.getElementById('volumeNum');
  if (el) el.textContent = '0';
}

function completeExercise(exKey, ei) {
  completedEx[exKey] = true;
  const card = document.getElementById(`card_${exKey}`);
  const btn  = document.getElementById(`compbtn_${exKey}`);
  if (card) card.classList.add('completed');
  if (btn)  { btn.classList.add('done'); btn.textContent = '✓ DONE'; }
  updateProgress(PROGRAM[currentDayIdx]);
}

function updateProgress(day) {
  const total = day.exercises.length;
  const done  = Object.keys(completedEx).filter(k => k.startsWith(day.id)).length;
  const pct   = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('progressText').textContent   = `${done} of ${total} exercises complete`;
  document.getElementById('progressPct').textContent    = pct + '%';
  const finishBtn = document.getElementById('finishBtn');
  if (done === total && total > 0) finishBtn.classList.add('ready');
  else finishBtn.classList.remove('ready');
}

function getRec(ex) {
  const h = ex.history;
  const last = h[h.length-1];
  if (h.every(v=>v===last)) return last + 2.5;
  if (h[h.length-1] > h[0]) return last + 2.5;
  return last;
}

// ══════════════════════════════════════════════════════
// SWAP / ALTERNATE
// ══════════════════════════════════════════════════════
async function requestSwap(exKey, ei) {
  const day = PROGRAM[currentDayIdx];
  const ex  = day.exercises[ei];
  const btn = document.querySelector(`#card_${exKey} .swap-sm-btn`);
  if (btn) { btn.textContent = '⇄ ...'; btn.disabled = true; }

  const prompt = `Suggest one alternate exercise for "${ex.name}" (${ex.sets}×${ex.reps}, targets: ${day.type}).
Respond ONLY as JSON, no markdown: {"altName":"<name>","reason":"<1-2 sentences: why it's a good swap and starting weight for Ty based on his history of ${ex.history.join(', ')} lbs>"}`;

  try {
    const res  = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:200,
        system: buildSystem(),
        messages:[{role:'user', content:prompt}]})
    });
    const data = await res.json();
    const raw  = data.content?.[0]?.text || '{}';
    let parsed = {};
    try { parsed = JSON.parse(raw.replace(/```json|```/g,'').trim()); } catch(e) { parsed = {altName:null, reason:raw}; }
    swapData[exKey] = { text: parsed.reason||raw, altName: parsed.altName||null, accepted:false };
  } catch(e) {
    swapData[exKey] = { text:'Could not reach trainer. Try again.', altName:null, accepted:false };
  }

  if (btn) { btn.textContent = '⇄ ALTERNATE'; btn.disabled = false; }

  const panel   = document.getElementById(`swappanel_${exKey}`);
  const textEl  = document.getElementById(`swaptext_${exKey}`);
  const useBtn  = document.getElementById(`swapuse_${exKey}`);
  if (panel && textEl) {
    textEl.textContent = swapData[exKey].text;
    if (!swapData[exKey].altName && useBtn) useBtn.style.display = 'none';
    else if (useBtn) useBtn.style.display = '';
    panel.classList.add('open');
  }
}

function acceptSwap(exKey, ei) {
  const sw = swapData[exKey];
  if (!sw || !sw.altName) return;
  sw.accepted = true;
  const nameEl = document.getElementById(`exname_${exKey}`);
  if (nameEl) nameEl.textContent = sw.altName;
  closeSwap(exKey);
}

function closeSwap(exKey) {
  const panel = document.getElementById(`swappanel_${exKey}`);
  if (panel) panel.classList.remove('open');
}

// ══════════════════════════════════════════════════════
// FEEDBACK
// ══════════════════════════════════════════════════════
async function goFeedback() {
  const day = PROGRAM[currentDayIdx];

  // Build session summary
  const completedNames = day.exercises
    .map((ex,ei) => completedEx[`${day.id}_${ei}`] ? ex.name : null)
    .filter(Boolean);
  const totalSets = day.exercises.reduce((s,e)=>s+e.sets,0);
  const loggedCount = Object.values(loggedSets).filter(v => v > 0).length;
  const volumeEl   = document.getElementById('volumeNum');
  const totalVol   = volumeEl ? volumeEl.textContent : '0';
  const swaps = Object.entries(swapData)
    .filter(([k,v])=>v.accepted)
    .map(([k,v])=>v.altName);

  // Stats
  const statsHtml = `
    <div class="stat-box"><div class="stat-val">${day.exercises.length}</div><div class="stat-lbl">EXERCISES</div></div>
    <div class="stat-box"><div class="stat-val">${loggedCount}</div><div class="stat-lbl">SETS LOGGED</div></div>
    <div class="stat-box" style="grid-column:span 2"><div class="stat-val" style="font-size:32px">${totalVol}</div><div class="stat-lbl">LBS TOTAL VOLUME</div></div>`;
  document.getElementById('feedbackStats').innerHTML = statsHtml;

  show('feedbackScreen');
  document.getElementById('feedbackLoading').style.display = 'flex';
  document.getElementById('feedbackText').style.display = 'none';

  const prompt = `Ty just finished ${day.name} (${day.type}).

Exercises completed: ${completedNames.join(', ') || 'none marked complete'}
Sets logged: ${loggedCount} of ${totalSets} total
Swapped exercises: ${swaps.length > 0 ? swaps.join(', ') : 'none'}
Total volume lifted: ${totalVol} lbs

Full program context:
${day.exercises.map(e=>`- ${e.name}: ${e.sets}×${e.reps}, history [${e.history.join(', ')}] lbs`).join('\n')}

Give Ty direct, specific post-workout feedback in 3–4 short paragraphs. Cover: 1) what he crushed today based on his history, 2) one or two things to watch or improve next session, 3) a specific weight target to hit next time for his strongest lift today. Be personal, concrete, and coach-like. No fluff.`;

  try {
    const res  = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:600,
        system: buildSystem(),
        messages:[{role:'user', content:prompt}]})
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || 'Good work today, Ty.';
    document.getElementById('feedbackLoading').style.display = 'none';
    const el = document.getElementById('feedbackText');
    el.style.display = 'block';
    el.innerHTML = text.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    el.innerHTML = '<p>' + el.innerHTML + '</p>';
  } catch(e) {
    document.getElementById('feedbackLoading').style.display = 'none';
    const el = document.getElementById('feedbackText');
    el.style.display = 'block';
    el.textContent = 'Could not load feedback. Great work finishing the session, Ty.';
  }
}

function buildSystem() {
  return `You are Coach Arnold, a direct and knowledgeable personal trainer for Ty — a busy guy who trains seriously. You speak plainly, reference his actual numbers, and keep it tight. No filler. No generic motivation. You know his full program: the Arnold Split across 6 days. When giving feedback, be specific to his history and the session he just completed.`;
}

// ══════════════════════════════════════════════════════
// SCREEN NAV
// ══════════════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
